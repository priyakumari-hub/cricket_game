<html>
<head>
<title>Cricket Game</title>
<style>
   body
   {
        text-align:center;
  }

 .button,.button1
{
   height:70%;
   width:20%;
  border:none;
  margin:10px;
 background-color:rgb(164,212,130);
 border-radius:50px;
 cursor:pointer;
}

.button1{
       height:10%;
       font-size: 5vh;
}

#container{
        display: flex;
        flex-direction: row;
        width: 90%;
        height:40%;
        justify-content: center;
}

 .image
{
  height:100%;
  border-radius:50px;
}
h1{
       font-size:4vh;
}

h3{
       font-size:3vh;
}
</style>
</head>
<body>
       <h1>Bat Ball Stump Game</h1>
       <div id="container">
       <button class="button" onclick="
        let computerChoice=generateComputerChoice();
        let resultMsg=getResult('Bat',computerChoice);
        showResult('Bat',computerChoice,resultMsg);
        "><img src="cricket.jpg" alt="Bat image" class="image"></button>
       
      <button class="button" onclick="
        computerChoice=generateComputerChoice();
        resultMsg=getResult('Ball',computerChoice);
        showResult('Ball',computerChoice,resultMsg);
        "><img src="Ball.jpg" alt="Ball image" class="image"></button>

      <button  class="button" onclick="
        computerChoice=generateComputerChoice();
        resultMsg=getResult('Stump',computerChoice);
        showResult('Stump',computerChoice,resultMsg);
        "><img src="stump.jpg" alt="Bat image" class="image"></button>
    </div>

    <h3 id="user-move"></h3>   
    <h3 id="computer-move"></h3>
    <h3 id="result"></h3>
    <h3 id="score"></h3>

    <button class="button1" onclick="localStorage.clear() 
            resetScore();     
        ">Reset</button>

      <script>
            let scoreStr=localStorage.getItem('Score');
           let score;
           resetScore(scoreStr);
       
           function resetScore(scoreStr)
            {
                score=scoreStr ? JSON.parse(scoreStr) : {
                 win:0,
                 lost:0,
                 tie:0,
              };
          
            score.displayScore=function() {
                      return `Score: Won:${score.win}, Lost:${score.lost}, Tie: ${score.tie}`;
                };
             showResult();
       }

        function generateComputerChoice() {
           let randomNumber=Math.random()*3;
           if (randomNumber>0 && randomNumber<=1)
           {
                  return 'Bat';
          }
          if (randomNumber>1 && randomNumber<=2)
           {
                  return 'Ball';
          }
          else {
              return 'Stump'
       }
   }

     function getResult(userMove,computerMove) 
    {
           if (userMove==='Bat')
          {
                    if(computerMove==='Ball')
                    {
                           score.win++;
                           return 'User won.';
                     }
                   else if(computerMove==='Bat')
                    {
                           score.tie++;
                           return `It's a tie.`;
                     }
                    else if(computerMove==='Stump')
                    {
                           score.lost++;
                           return 'Computer has won.';
                     }
           }
        else if (userMove==='Ball')
          {
                    if(computerMove==='Ball')
                    {
                           score.tie++;
                           return `It's a tie.`;
                     }
                   else if(computerMove==='Bat')
                    {
                           score.lost++;
                           return 'Computer has won.';
                     }
                    else if(computerMove==='Stump')
                    {
                           score.win++;
                           return 'User won. ';
                     }
        }
        else
       {
                if(computerMove==='Ball')
                    {
                           score.lost++;
                           return  'Computer has won.';
                     }
                   else if(computerMove==='Bat')
                    {
                           score.win++;
                           return 'User won.';
                     }
                    else if(computerMove==='Stump')
                    {
                           score.tie++;
                           return `It's a tie.`;
                     }
             }
     }

    function showResult(userMove,computerMove,result)
    {
           localStorage.setItem('Score',JSON.stringify(score));
           document.querySelector('#user-move').innerText=userMove !== undefined ? `You have chosen ${userMove}` : '';
           document.querySelector('#computer-move').innerText=computerMove ? `Computer have chosen ${computerMove}` : '';
          document.querySelector('#result').innerText=result || '';
         document.querySelector('#score').innerText=score.displayScore();
         displayScore();
   }
</script>
</body>
</html>
